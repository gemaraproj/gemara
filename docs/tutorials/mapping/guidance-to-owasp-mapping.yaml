# Mapping document: Secure Software Development Guidance → OWASP Top 10
# Conforms to Gemara #MappingDocument (mapping.cue per PR #313).
# Maps docs/tutorials/guidance/guidance-example.yaml guidelines to OWASP controls.

title: Secure Software Development Guidance to OWASP Top 10
description: |
  Alignment from our internal secure development guidelines (ORG.SSD) to OWASP Top 10 (2025)
  for traceability and audit.

metadata:
  id: ORG.SSD.OWASP-MAP.001
  version: "1.0.0"
  description: Mapping from ORG.SSD guidance catalog to OWASP Top 10 Web Application Security Risks (2025).
  author:
    id: example
    name: Example
    type: Human
  mapping-references:
    - id: ORG.SSD.001
      title: Secure Software Development Guidance
      version: "1.0.0"
      description: Internal secure development and supply chain security guidelines.
      url: https://example.org/guidance/guidance-example.yaml
    - id: OWASP
      title: OWASP Top 10
      version: "2025"
      description: OWASP Top 10 Web Application Security Risks (2025)
      url: https://owasp.org/Top10/2025

source-reference:
  reference-id: ORG.SSD.001

target-reference:
  reference-id: OWASP

mappings:
  # GL01 Prefer Immutable Image References → Software Supply Chain (A03:2025), Integrity (A08:2025)
  - source:
      entry-id: ORG.SSD.GL01
      entry-type: Guideline
    target:
      entry-id: A03:2025
      entry-type: Control
    relationship: supports
    remarks: Immutable image references reduce software supply chain and tampering risks.
  - source:
      entry-id: ORG.SSD.GL01
      entry-type: Guideline
    target:
      entry-id: A08:2025
      entry-type: Control
    relationship: supports
    remarks: Digest-based references support software or data integrity.
  # GL02 Prefer Branch Protection → Access Control (A01:2025), Authentication (A07:2025)
  - source:
      entry-id: ORG.SSD.GL02
      entry-type: Guideline
    target:
      entry-id: A01:2025
      entry-type: Control
    relationship: supports
    remarks: Branch protection and review support access control.
  - source:
      entry-id: ORG.SSD.GL02
      entry-type: Guideline
    target:
      entry-id: A07:2025
      entry-type: Control
    relationship: supports
    remarks: Required review and approval support authentication practices.
  # GL03 Prefer VPN on Untrusted Networks → Cryptographic Failures (A04:2025)
  - source:
      entry-id: ORG.SSD.GL03
      entry-type: Guideline
    target:
      entry-id: A04:2025
      entry-type: Control
    relationship: supports
    remarks: VPN on untrusted networks mitigates cryptographic and interception risks.
